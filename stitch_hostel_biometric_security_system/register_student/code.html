<style>
        .input-field {
            @apply w-full h-12 px-4 rounded-xl border border-outline-variant bg-surface focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim transition-all duration-200 outline-none font-body-base text-body-base text-on-surface placeholder:text-on-surface-variant;
        }
        .form-label {
            @apply block font-label-caps text-label-caps text-on-surface mb-2 uppercase;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col md:flex-row font-body-base">
<!-- Mobile Top App Bar (Task-Focused: Suppress main nav, use standard header) -->
<header class="md:hidden flex justify-between items-center h-16 px-container-padding w-full bg-surface border-b border-outline-variant z-40 sticky top-0 shadow-sm">
<div class="flex items-center gap-inline-element-gap">
<button aria-label="Go Back" class="p-2 hover:bg-surface-container-low rounded-full transition-colors">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface">Register Student</h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-[600px] mx-auto p-container-padding pb-[100px] md:py-[80px]">
<!-- Desktop Header (Task-Focused) -->
<div class="hidden md:flex items-center gap-4 mb-8">
<button aria-label="Go Back" class="p-2 bg-surface shadow-sm hover:shadow-md rounded-full transition-all border border-outline-variant">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</button>
<div>
<h1 class="font-display-bold text-display-bold text-on-surface">Register Student</h1>
<p class="font-body-base text-body-base text-on-surface-variant mt-1">Enter profile details for the new hostel resident.</p>
</div>
</div>
<!-- Registration Form -->
<form class="space-y-[18px] bg-surface rounded-2xl p-6 shadow-md border border-outline-variant">
<!-- Full Name -->
<div>
<label class="form-label" for="fullName">Full Name</label>
<input class="input-field" id="fullName" placeholder="e.g. Jane Doe" required="" type="text"/>
</div>
<!-- Roll Number -->
<div>
<label class="form-label" for="rollNumber">Roll Number</label>
<input class="input-field font-mono-data" id="rollNumber" placeholder="e.g. CS2023001" required="" type="text"/>
</div>
<!-- Department -->
<div>
<label class="form-label" for="department">Department</label>
<input class="input-field" id="department" placeholder="e.g. Computer Science" required="" type="text"/>
</div>
<!-- Year of Study (Dropdown) -->
<div>
<label class="form-label" for="yearOfStudy">Year of Study</label>
<div class="relative">
<select class="input-field appearance-none cursor-pointer" id="yearOfStudy" required="">
<option disabled="" selected="" value="">Select Year</option>
<option value="1">1st Year (Freshman)</option>
<option value="2">2nd Year (Sophomore)</option>
<option value="3">3rd Year (Junior)</option>
<option value="4">4th Year (Senior)</option>
<option value="5">Postgraduate</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Room Number -->
<div>
<label class="form-label" for="roomNumber">Room Number</label>
<input class="input-field font-mono-data" id="roomNumber" placeholder="e.g. B-204" required="" type="text"/>
</div>
<!-- Parent's Phone -->
<div>
<label class="form-label" for="parentPhone">Parent's Phone</label>
<div class="flex">
<span class="inline-flex items-center px-4 rounded-l-xl border border-r-0 border-outline-variant bg-surface-container-low text-on-surface-variant font-mono-data text-mono-data">
                        +1
                    </span>
<input class="input-field rounded-l-none focus:z-10" id="parentPhone" placeholder="(555) 000-0000" required="" type="tel"/>
</div>
</div>
<!-- Decorative visual element to balance the form -->
<div class="mt-8 pt-6 border-t border-surface-variant flex items-center justify-between text-on-surface-variant">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="shield">shield</span>
<span class="font-body-sm text-body-sm">Data secured via end-to-end encryption.</span>
</div>
</div>
</form>
</main>
<!-- Fixed Footer Action -->
<div class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-50 md:sticky md:bg-transparent md:border-none md:shadow-none md:p-0 md:mt-8 md:max-w-[600px] md:mx-auto md:pb-12">
<button class="w-full bg-[#10b981] hover:bg-[#059669] text-white h-14 rounded-xl font-headline-md text-headline-md flex items-center justify-center gap-2 transition-colors shadow-md active:scale-[0.98]" type="submit">
            Continue to Face Scan
            <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</body></html>
