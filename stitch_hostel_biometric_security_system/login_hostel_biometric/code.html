<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Hostel Biometric - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#d3e4fe",
                        "tertiary": "#943700",
                        "error": "#ba1a1a",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed-variant": "#38485d",
                        "on-tertiary-fixed": "#360f00",
                        "primary-fixed": "#dbe1ff",
                        "on-surface": "#191b23",
                        "on-surface-variant": "#434655",
                        "primary-fixed-dim": "#b4c5ff",
                        "tertiary-fixed-dim": "#ffb596",
                        "on-error-container": "#93000a",
                        "on-primary-fixed": "#00174b",
                        "surface-container": "#ededf9",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2e3039",
                        "surface-variant": "#e1e2ed",
                        "tertiary-container": "#bc4800",
                        "tertiary-fixed": "#ffdbcd",
                        "background": "#faf8ff",
                        "surface-container-low": "#f3f3fe",
                        "surface-container-highest": "#e1e2ed",
                        "inverse-primary": "#b4c5ff",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "secondary-container": "#d0e1fb",
                        "secondary": "#505f76",
                        "on-error": "#ffffff",
                        "surface": "#faf8ff",
                        "surface-bright": "#faf8ff",
                        "on-primary-container": "#eeefff",
                        "secondary-fixed-dim": "#b7c8e1",
                        "outline": "#737686",
                        "on-primary-fixed-variant": "#003ea8",
                        "error-container": "#ffdad6",
                        "surface-dim": "#d9d9e5",
                        "outline-variant": "#c3c6d7",
                        "on-primary": "#ffffff",
                        "primary-container": "#2563eb",
                        "surface-container-high": "#e7e7f3",
                        "on-background": "#191b23",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#0b1c30",
                        "primary": "#004ac6",
                        "surface-tint": "#0053db",
                        "inverse-on-surface": "#f0f0fb",
                        "on-tertiary-container": "#ffede6",
                        "on-secondary-container": "#54647a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "grid-gutter": "20px",
                        "stack-gap": "16px",
                        "container-padding": "24px",
                        "inline-element-gap": "8px"
                    },
                    "fontFamily": {
                        "body-sm": ["Inter"],
                        "mono-data": ["Inter"],
                        "label-caps": ["Inter"],
                        "headline-md": ["Inter"],
                        "display-bold": ["Inter"],
                        "body-base": ["Inter"]
                    },
                    "fontSize": {
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "mono-data": ["14px", { "lineHeight": "20px", "letterSpacing": "-0.01em", "fontWeight": "500" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "display-bold": ["28px", { "lineHeight": "34px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-base": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body { -webkit-tap-highlight-color: transparent; }
        /* Focus ring utility */
        .input-focus:focus-within {
            border-color: #004ac6;
            box-shadow: 0 0 0 4px rgba(0, 74, 198, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center font-body-base antialiased w-full max-w-[375px] mx-auto overflow-x-hidden relative">
<!-- Decorative background subtle gradient -->
<div class="absolute inset-0 pointer-events-none bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-surface-container-low via-background to-background"></div>
<main class="w-full px-container-padding flex flex-col justify-center h-full relative z-10 flex-grow pt-12 pb-8">
<!-- Header -->
<header class="flex flex-col items-center mb-[48px]">
<div class="w-16 h-16 rounded-full bg-surface-container-high flex items-center justify-center mb-6 shadow-sm border border-outline-variant/30 text-primary">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<h1 class="font-display-bold text-display-bold text-on-background text-center tracking-tight mb-2">Hostel Biometric</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant text-center">Institutional Security Dashboard</p>
</header>
<!-- Login Form -->
<form class="flex flex-col gap-stack-gap w-full" onsubmit="event.preventDefault(); window.location.href='#';">
<!-- Email Input -->
<div class="flex flex-col gap-inline-element-gap">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1 uppercase" for="email">Email Address</label>
<div class="relative group input-focus rounded-xl transition-all duration-200 bg-surface">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">mail</span>
</span>
<input class="w-full h-[52px] pl-12 pr-4 bg-transparent border border-outline-variant rounded-xl font-body-base text-body-base text-on-background placeholder:text-outline-variant/70 focus:outline-none focus:ring-0" id="email" placeholder="admin@institution.edu" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-inline-element-gap mt-2">
<div class="flex justify-between items-center ml-1">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Password</label>
</div>
<div class="relative group input-focus rounded-xl transition-all duration-200 bg-surface">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">key</span>
</span>
<input class="w-full h-[52px] pl-12 pr-12 bg-transparent border border-outline-variant rounded-xl font-body-base text-body-base text-on-background placeholder:text-outline-variant/70 focus:outline-none focus:ring-0" id="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors focus:outline-none p-1" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col items-center mt-[32px] gap-stack-gap">
<button class="w-full h-[52px] bg-primary text-on-primary rounded-xl font-label-caps text-label-caps flex items-center justify-center uppercase tracking-wide shadow-sm hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all duration-200" type="submit">
                    Login to Dashboard
                </button>
<a class="font-body-sm text-body-sm text-primary hover:text-on-primary-fixed-variant transition-colors py-2" href="#">
                    Forgot Password?
                </a>
</div>
</form>
<!-- Footer -->
<footer class="mt-auto pt-12 flex justify-center pb-safe">
<p class="font-label-caps text-[10px] uppercase tracking-[0.1em] text-outline text-center flex items-center gap-1 opacity-70">
                Powered by Biometric AI <span class="material-symbols-outlined text-[14px]">fingerprint</span>
</p>
</footer>
</main>
</body></html>
